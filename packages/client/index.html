<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Space Flight Simulator</title>
    <style>
      :root {
        --accent: #79d2ff;
        --text: #dfe9f5;
        --text-dim: #7f96b2;
        --panel: rgba(9, 15, 26, 0.62);
        --panel-border: rgba(121, 210, 255, 0.22);
        --panel-glow: inset 0 1px 0 rgba(255, 255, 255, 0.07);
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        touch-action: none;
        overscroll-behavior: none;
        font-family: system-ui, -apple-system, sans-serif;
      }
      #app,
      #app canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      #debug {
        position: fixed;
        bottom: env(safe-area-inset-bottom, 8px);
        right: 8px;
        color: #7fdc7f;
        font: 12px/1.5 ui-monospace, monospace;
        pointer-events: none;
        white-space: pre;
        text-shadow: 0 1px 2px #000;
        text-align: right;
        z-index: 30;
      }

      /* ---------- flight HUD ---------- */
      .hud {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 20;
        color: #dfe9f5;
        user-select: none;
        -webkit-user-select: none;
      }
      .hud button {
        pointer-events: auto;
        touch-action: manipulation;
      }
      .readouts {
        position: absolute;
        top: calc(env(safe-area-inset-top, 0px) + 10px);
        left: calc(env(safe-area-inset-left, 0px) + 12px);
        font: 13px/1.6 ui-monospace, monospace;
        font-variant-numeric: tabular-nums;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        padding: 8px 12px;
        min-width: 148px;
        backdrop-filter: blur(10px) saturate(1.3);
        -webkit-backdrop-filter: blur(10px) saturate(1.3);
        box-shadow: var(--panel-glow), 0 4px 16px rgba(0, 0, 0, 0.35);
      }
      .readout-row {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }
      .readout-label {
        color: #7f96b2;
      }
      .status-line {
        margin-top: 4px;
        color: #79d2ff;
        letter-spacing: 0.15em;
        font-size: 11px;
      }
      .hud-btn {
        background: rgba(14, 22, 36, 0.72);
        border: 1px solid rgba(120, 160, 210, 0.4);
        border-radius: 10px;
        color: var(--text);
        font: 600 14px system-ui;
        letter-spacing: 0.08em;
        padding: 12px 18px;
        min-width: 44px;
        min-height: 44px;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-shadow: var(--panel-glow);
        transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
        cursor: pointer;
      }
      .hud-btn:hover {
        border-color: var(--accent);
        box-shadow: var(--panel-glow), 0 0 12px rgba(121, 210, 255, 0.25);
      }
      .hud-btn:active {
        background: rgba(60, 100, 160, 0.8);
      }
      .map-btn {
        position: absolute;
        top: calc(env(safe-area-inset-top, 0px) + 10px);
        right: calc(env(safe-area-inset-right, 0px) + 12px);
      }
      .throttle-wrap {
        position: absolute;
        right: calc(env(safe-area-inset-right, 0px) + 14px);
        top: 50%;
        transform: translateY(-58%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        pointer-events: auto;
      }
      .throttle-title {
        font: 10px ui-monospace, monospace;
        color: #7f96b2;
        letter-spacing: 0.15em;
      }
      .throttle-track {
        width: 40px;
        height: 26vh;
        min-height: 130px;
        background: rgba(16, 26, 42, 0.8);
        border: 1px solid rgba(120, 160, 210, 0.4);
        border-radius: 10px;
        position: relative;
        overflow: hidden;
        touch-action: none;
      }
      .throttle-fill {
        position: absolute;
        bottom: 0;
        width: 100%;
        background: linear-gradient(#ffb347, #ff7847);
      }
      .fuel-track {
        width: 12px;
        height: 9vh;
        min-height: 50px;
        background: rgba(16, 26, 42, 0.8);
        border: 1px solid rgba(120, 160, 210, 0.4);
        border-radius: 6px;
        position: relative;
        overflow: hidden;
      }
      .fuel-fill {
        position: absolute;
        bottom: 0;
        width: 100%;
        background: #58c470;
      }
      .stage-btn {
        position: absolute;
        right: calc(env(safe-area-inset-right, 0px) + 12px);
        bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
        background: rgba(60, 30, 20, 0.85);
        border-color: rgba(255, 150, 90, 0.5);
      }
      .engine-wrap {
        position: absolute;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
        left: 50%;
        transform: translateX(-50%);
        display: none;
        gap: 8px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        padding: 8px;
        backdrop-filter: blur(10px) saturate(1.3);
        -webkit-backdrop-filter: blur(10px) saturate(1.3);
        box-shadow: var(--panel-glow), 0 4px 16px rgba(0, 0, 0, 0.35);
      }
      .engine-wrap.visible {
        display: flex;
      }
      .engine-chip {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 3px;
        min-width: 96px;
        padding: 7px 10px 6px;
        background: rgba(14, 22, 36, 0.72);
        border: 1px solid rgba(120, 160, 210, 0.35);
        border-radius: 9px;
        color: var(--text-dim);
        font: 600 11px system-ui;
        letter-spacing: 0.06em;
        text-align: left;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s, box-shadow 0.15s, color 0.15s;
      }
      .engine-chip:hover {
        border-color: var(--accent);
      }
      .engine-chip.on {
        color: var(--text);
        border-color: rgba(140, 232, 165, 0.55);
        background: rgba(24, 52, 34, 0.65);
        box-shadow: var(--panel-glow), 0 0 12px rgba(110, 220, 140, 0.22);
      }
      .engine-chip.no-fuel {
        opacity: 0.55;
      }
      .engine-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .engine-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #4a5a70;
        transition: background 0.15s, box-shadow 0.15s;
      }
      .engine-chip.on .engine-dot {
        background: #8fe8a5;
        box-shadow: 0 0 8px rgba(143, 232, 165, 0.9);
      }
      .engine-chip.on.no-fuel .engine-dot {
        background: #ff8d7a;
        box-shadow: 0 0 8px rgba(255, 141, 122, 0.8);
      }
      .engine-key {
        font: 600 9px ui-monospace, monospace;
        color: var(--text-dim);
        border: 1px solid rgba(120, 160, 210, 0.35);
        border-radius: 4px;
        padding: 1px 4px;
        line-height: 1.2;
      }
      .engine-name {
        font-size: 11px;
        white-space: nowrap;
      }
      .engine-meta {
        font: 9px ui-monospace, monospace;
        letter-spacing: 0.14em;
        color: var(--text-dim);
      }
      .engine-chip.on .engine-meta {
        color: #8fe8a5;
      }
      .engine-chip.no-fuel .engine-meta {
        color: #ff8d7a;
      }
      .rot-wrap {
        position: absolute;
        left: calc(env(safe-area-inset-left, 0px) + 14px);
        bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
        display: flex;
        gap: 12px;
      }
      .rot-btn {
        font-size: 20px;
        padding: 14px 22px;
        touch-action: none;
      }
      .warp-wrap {
        position: absolute;
        top: calc(env(safe-area-inset-top, 0px) + 10px);
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        padding: 4px 8px;
        backdrop-filter: blur(10px) saturate(1.3);
        -webkit-backdrop-filter: blur(10px) saturate(1.3);
        box-shadow: var(--panel-glow), 0 4px 16px rgba(0, 0, 0, 0.35);
      }
      .warp-btn {
        padding: 6px 10px;
        min-height: 36px;
        font-size: 12px;
      }
      .warp-display {
        font: 600 14px ui-monospace, monospace;
        font-variant-numeric: tabular-nums;
        color: #ffcf7d;
        min-width: 64px;
        text-align: center;
      }
      .warp-clock {
        font: 11px ui-monospace, monospace;
        font-variant-numeric: tabular-nums;
        color: var(--text-dim);
        min-width: 80px;
        text-align: center;
      }
      .vab-btn {
        position: absolute;
        top: calc(env(safe-area-inset-top, 0px) + 66px);
        right: calc(env(safe-area-inset-right, 0px) + 12px);
      }

      /* ---------- builder (VAB) ---------- */
      .builder {
        position: fixed;
        inset: 0;
        display: grid;
        grid-template-columns: 108px 1fr minmax(180px, 236px);
        background: linear-gradient(#0d1219, #171f2b);
        color: var(--text);
        user-select: none;
        -webkit-user-select: none;
        z-index: 10;
      }
      .builder-palette {
        overflow-y: auto;
        border-right: 1px solid rgba(120, 160, 210, 0.2);
        padding: 8px 6px calc(env(safe-area-inset-bottom, 0px) + 8px);
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .palette-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        background: rgba(16, 26, 42, 0.8);
        border: 1px solid rgba(120, 160, 210, 0.25);
        border-radius: 8px;
        padding: 7px 4px 5px;
        cursor: grab;
        touch-action: none;
        min-height: 44px;
        transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
      }
      .palette-item:hover {
        border-color: var(--accent);
        transform: translateY(-1px);
        box-shadow: 0 0 10px rgba(121, 210, 255, 0.18);
      }
      .palette-item span {
        font: 9px system-ui;
        color: #8ea3bd;
        text-align: center;
      }
      .builder-canvas-wrap {
        position: relative;
        overflow: hidden;
        /* blueprint grid + soft vignette behind the craft */
        background-image:
          radial-gradient(ellipse at 50% 45%, rgba(60, 110, 170, 0.14), transparent 65%),
          repeating-linear-gradient(0deg, rgba(121, 210, 255, 0.05) 0 1px, transparent 1px 48px),
          repeating-linear-gradient(90deg, rgba(121, 210, 255, 0.05) 0 1px, transparent 1px 48px);
      }
      .builder-canvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }
      .builder-hint {
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        font: 11px system-ui;
        color: #5d7391;
        pointer-events: none;
        white-space: nowrap;
      }
      .craft-part {
        cursor: pointer;
      }
      .drag-ghost {
        position: fixed;
        z-index: 100;
        pointer-events: none;
        opacity: 0.85;
      }
      .builder-side {
        border-left: 1px solid rgba(120, 160, 210, 0.2);
        padding: 10px 10px calc(env(safe-area-inset-bottom, 0px) + 10px);
        display: flex;
        flex-direction: column;
        gap: 10px;
        overflow-y: auto;
      }
      .builder-name {
        background: rgba(16, 26, 42, 0.8);
        border: 1px solid rgba(120, 160, 210, 0.4);
        border-radius: 8px;
        color: #dfe9f5;
        font: 600 15px system-ui;
        padding: 9px 10px;
        width: 100%;
        box-sizing: border-box;
      }
      .builder-stats {
        font: 13px/1.7 ui-monospace, monospace;
        font-variant-numeric: tabular-nums;
        color: #9fb4cd;
      }
      .builder-stats b {
        color: #dfe9f5;
      }
      .builder-stats .bad {
        color: #ff8d7a;
      }
      .builder-issues .issue {
        font: 11px/1.5 system-ui;
        border-radius: 6px;
        padding: 4px 8px;
        margin-bottom: 4px;
      }
      .issue-error {
        background: rgba(140, 40, 30, 0.35);
        color: #ffb0a3;
      }
      .issue-warning {
        background: rgba(140, 110, 30, 0.3);
        color: #ffd98f;
      }
      .builder-stages {
        font: 11px/1.8 ui-monospace, monospace;
        color: #8ea3bd;
      }
      .builder-actions {
        margin-top: auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .builder-actions .hud-btn {
        pointer-events: auto;
      }
      .builder-launch {
        grid-column: 1 / -1;
        background: linear-gradient(rgba(38, 105, 52, 0.95), rgba(24, 74, 36, 0.95));
        border-color: rgba(110, 220, 140, 0.55);
        font-size: 16px;
        letter-spacing: 0.18em;
        box-shadow: var(--panel-glow), 0 0 18px rgba(110, 220, 140, 0.22);
      }
      .builder-launch:hover:not(:disabled) {
        border-color: #8fe8a5;
        box-shadow: var(--panel-glow), 0 0 26px rgba(110, 220, 140, 0.4);
      }
      .builder-launch:disabled {
        opacity: 0.4;
        box-shadow: none;
      }
      .builder-online {
        border-top: 1px solid rgba(120, 160, 210, 0.2);
        padding-top: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .online-title {
        font: 600 11px system-ui;
        letter-spacing: 0.15em;
        color: #7f96b2;
      }
      .pilot-name,
      .lobby-code {
        background: rgba(16, 26, 42, 0.8);
        border: 1px solid rgba(120, 160, 210, 0.4);
        border-radius: 8px;
        color: #dfe9f5;
        font: 14px system-ui;
        padding: 8px 10px;
        width: 100%;
        box-sizing: border-box;
      }
      .online-row {
        display: flex;
        gap: 6px;
      }
      .online-row .lobby-code {
        width: 72px;
        text-transform: uppercase;
      }
      .online-row .hud-btn {
        flex: 1;
        padding: 8px 6px;
        font-size: 12px;
      }
      .online-status {
        font: 11px system-ui;
        color: #8ea3bd;
        min-height: 14px;
      }

      /* ---------- narrow / portrait phones ---------- */
      @media (max-width: 700px) {
        .builder {
          grid-template-columns: 84px 1fr;
          grid-template-rows: 1fr 252px;
        }
        .builder-palette {
          grid-row: 1;
          grid-column: 1;
        }
        .palette-item span {
          display: none;
        }
        .builder-canvas-wrap {
          grid-row: 1;
          grid-column: 2;
        }
        .builder-hint {
          display: none;
        }
        .builder-side {
          grid-row: 2;
          grid-column: 1 / -1;
          border-left: none;
          border-top: 1px solid rgba(120, 160, 210, 0.2);
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 8px 12px;
          align-content: start;
        }
        .builder-name,
        .builder-issues,
        .builder-actions,
        .builder-online {
          grid-column: 1 / -1;
        }
        .builder-actions {
          margin-top: 0;
          grid-template-columns: repeat(3, 1fr);
        }
        .builder-actions .hud-btn {
          padding: 10px 6px;
          font-size: 12px;
        }
        .warp-wrap {
          top: auto;
          bottom: calc(env(safe-area-inset-bottom, 0px) + 92px);
        }
        .warp-clock {
          display: none;
        }
        .readouts {
          font-size: 12px;
          min-width: 128px;
        }
      }

      .toast {
        position: absolute;
        top: 18%;
        left: 50%;
        transform: translateX(-50%) translateY(-6px);
        background: rgba(8, 14, 24, 0.8);
        border: 1px solid rgba(120, 200, 255, 0.4);
        border-radius: 10px;
        padding: 10px 22px;
        font: 600 15px system-ui;
        letter-spacing: 0.1em;
        opacity: 0;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-shadow: var(--panel-glow), 0 6px 20px rgba(0, 0, 0, 0.4);
        transition: opacity 0.25s ease, transform 0.25s ease;
      }
      .toast.visible {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .crash-overlay {
        position: absolute;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: rgba(20, 4, 4, 0.55);
      }
      .crash-overlay.visible {
        display: flex;
      }
      .crash-title {
        font: 700 22px system-ui;
        letter-spacing: 0.2em;
        color: #ff8d7a;
      }
      .recovered-overlay {
        background: rgba(6, 20, 10, 0.55);
      }
      .recovered-title {
        color: #8fe8a5;
      }
      .heat-row {
        position: absolute;
        top: calc(env(safe-area-inset-top, 0px) + 64px);
        left: 50%;
        transform: translateX(-50%);
        display: none;
        align-items: center;
        gap: 8px;
        background: rgba(24, 10, 6, 0.7);
        border: 1px solid rgba(255, 140, 90, 0.4);
        border-radius: 8px;
        padding: 5px 10px;
        font: 11px ui-monospace, monospace;
      }
      .heat-row.visible {
        display: flex;
      }
      .heat-track {
        width: 110px;
        height: 8px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 4px;
        overflow: hidden;
      }
      .heat-fill {
        height: 100%;
        background: linear-gradient(90deg, #ff9d47, #ff5f3d);
        transition: width 0.2s;
      }
      .heat-fill.critical {
        background: #ff2f1f;
      }
      .restart-btn {
        pointer-events: auto;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
